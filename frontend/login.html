<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenVision - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
        
        .login-container {
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group input:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-50 flex items-center justify-center min-h-screen">

    <div class="login-container bg-white p-8 rounded-lg shadow-xl w-full max-w-md mx-4">
        
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="assets/logo.png" alt="GreenVision" style="height: 50px; width: auto; border-radius: 8px;">
            </div>
            <h1 class="text-3xl font-bold text-emerald-600">GreenVision</h1>
            <p class="text-gray-500 mt-2 text-sm">مرحباً بك! يرجى تسجيل دخول حسابك</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            
            <!-- Email Input -->
            <div class="mb-4">
                <label for="email" class="block text-gray-700 text-sm font-bold mb-2">البريد الإلكتروني أو اسم المستخدم</label>
                <div class="input-group">
                    <input 
                        type="email" 
                        id="email" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition" 
                        placeholder="أدخل بريدك الإلكتروني" 
                        required>
                </div>
            </div>

            <!-- Password Input -->
            <div class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2">كلمة المرور</label>
                <div class="input-group">
                    <input 
                        type="password" 
                        id="password" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition" 
                        placeholder="••••••••" 
                        required>
                </div>
            </div>

            <!-- Remember Me -->
            <div class="mb-6 flex items-center">
                <input type="checkbox" id="remember" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                <label for="remember" class="ml-2 text-sm text-gray-600">تذكرني</label>
            </div>

            <!-- Sign In Button -->
            <button 
                type="submit" 
                class="w-full bg-emerald-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-emerald-700 transition duration-300 flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i>
                دخول
            </button>
        </form>

        <!-- Forgot Password Link -->
        <div class="text-center mt-4">
            <a href="#" class="text-sm text-emerald-600 hover:text-emerald-700 hover:underline transition">هل نسيت كلمة المرور؟</a>
        </div>

        <!-- Footer -->
        <div class="border-t border-gray-200 mt-6 pt-6 text-center">
            <p class="text-xs text-gray-500">© 2026 GreenVision. جميع الحقوق محفوظة.</p>
        </div>
    </div>

    <script>
        // Test Credentials (بيانات اختبارية)
        const testCredentials = {
            drone: {
                email: 'operator@greenvision.com',
                password: 'drone123'
            },
            specialist: {
                email: 'specialist@greenvision.com',
                password: 'specialist123'
            }
        };

        // Get redirect page from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const redirectPage = urlParams.get('redirect') || 'index.html';

        // Determine which role based on redirect page
        function getRole() {
            if (redirectPage.includes('drone')) return 'drone';
            if (redirectPage.includes('specialist')) return 'specialist';
            return null;
        }

        // Handle login form submission
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const button = event.target.querySelector('button');
            
            const role = getRole();
            const credentials = testCredentials[role];

            // Check credentials
            if (!credentials || email !== credentials.email || password !== credentials.password) {
                alert('❌ البريد الإلكتروني أو كلمة المرور غير صحيحة!\n\nاستخدم:\nالبريد: ' + credentials.email + '\nالرمز: ' + credentials.password);
                return;
            }

            // Login successful
            button.innerText = '✓ جاري الدخول...';
            button.disabled = true;
            
            setTimeout(() => {
                window.location.href = redirectPage;
            }, 800);
        }
    </script>

</body>
</html>
